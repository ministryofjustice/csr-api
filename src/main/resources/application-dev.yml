spring:

  flyway:
    enabled: true
    locations: classpath:db/migration/h2

  jpa:
    show-sql: true

  h2:
    console:
      enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9090/auth/.well-known/jwks.json

logging:
  level:
    uk.gov: DEBUG

csr:
  url: 'jdbc:h2:mem:csr-api-1;Mode=Oracle;'
  username: csr
  password: dummy
  driverClassName: org.h2.Driver
  regions:
    - name: 1
      schema: PUBLIC
    - name: 2
      schema: PUBLIC

server:
  shutdown: immediate

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
